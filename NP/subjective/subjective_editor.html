<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAHIS - Subjective Editor</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-elevated: #ffffff;
      --bg-card: #e1e8f0;
      --bg-card-hover: #d9e3ef;
      --border: #d9d9d9;
      --border-light: #eaeef3;
      --text: #3d4e60;
      --text-muted: #5c6d7d;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --text-blue: #2563eb;
      --green: #10b981;
      --green-hover: #1ab784;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-y: auto;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
      height: auto;
    }

    .editor {
      width: 100%;
      max-width: 1200px;
      height: auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .editor-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elevated);
      font-weight: 600;
      font-size: 14px;
      color: var(--text-blue);
      flex-shrink: 0;
    }

    .editor-body {
      display: flex;
      align-items: stretch;
      position: relative;
    }

    .topics-col {
      width: 260px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
    }

    .topics-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }

    .topics-nav {
      padding: 12px 12px 0 12px;
      margin-bottom: 42px;
    }

    .topic-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 4px;
      transition: background 0.15s, color 0.15s;
      border: 1px solid transparent;
    }

    .topic-item:hover {
      background: var(--bg-card-hover);
      color: var(--text);
    }

    .topic-item.active {
      background: var(--bg-elevated);
      color: var(--text);
      border-color: var(--accent);
    }

    .editor-col {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 260px;
      display: flex;
      flex-direction: column;
      background: var(--bg-elevated);
      overflow: hidden;
    }

    .editor-col-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .assessment-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 16px; border: 1px solid #fdba74; border-radius: 999px;
      font-size: 13px; background: #fff7ed; color: #ea580c;
      font-family: inherit; cursor: pointer; font-weight: 500;
      transition: all .15s;
    }
    .assessment-badge:hover { background: #ffedd5; border-color: #fb923c; }
    .assessment-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #f97316; }

    .vpe-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 16px; border: 1px solid #c4b5fd; border-radius: 999px;
      font-size: 13px; background: #f5f3ff; color: #7c3aed;
      font-family: inherit; cursor: pointer; font-weight: 500;
      transition: all .15s;
    }
    .vpe-badge:hover { background: #ede9fe; border-color: #a78bfa; }
    .vpe-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #7c3aed; }

    .tx-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 16px; border: 1px solid #93c5fd; border-radius: 999px;
      font-size: 13px; background: #eff6ff; color: #2563eb;
      font-family: inherit; cursor: pointer; font-weight: 500;
      transition: all .15s;
    }
    .tx-badge:hover { background: #dbeafe; border-color: #60a5fa; }
    .tx-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; }

    .rx-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 16px; border: 1px solid #86efac; border-radius: 999px;
      font-size: 13px; background: #f0fdf4; color: #16a34a;
      font-family: inherit; cursor: pointer; font-weight: 500;
      transition: all .15s;
    }
    .rx-badge:hover { background: #dcfce7; border-color: #4ade80; }
    .rx-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }

    .topics-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }

    .topic-section {
      padding-bottom: 32px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      scroll-margin-top: 80px;
    }

    .topic-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 60vh;
    }

    .topic-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    .topic-textarea {
      width: 100%;
      min-height: 80px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      overflow: hidden;
      outline: none;
    }

    .topic-textarea:focus {
      border-color: var(--border-light);
    }

    .topic-textarea::placeholder {
      color: var(--text-muted);
    }

    .topics-nav-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 8px 0 8px 0;
    }

    .topic-assessment-block {
      width: 100%;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.7;
      color: #334155;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-y: auto;
      max-height: 500px;
    }
    .topic-assessment-block .asm-title {
      font-weight: 700;
      color: #1e293b;
      font-size: 13px;
      margin-top: 10px;
      margin-bottom: 2px;
    }
    .topic-assessment-block .asm-title:first-child { margin-top: 0; }
    .topic-assessment-block .asm-label {
      font-weight: 600;
      color: #475569;
    }
    .topic-assessment-block .asm-detail {
      padding-left: 12px;
      color: #64748b;
    }
    .topic-assessment-block .asm-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      line-height: 1.8;
    }
    .topic-assessment-block .asm-row .asm-label {
      flex: 0 0 140px;
    }
    .topic-assessment-block .asm-row .asm-val {
      flex: 1;
      color: #334155;
    }

    .extras-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-top: 16px;
    }

    .remarkable {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      white-space: nowrap;
      margin-top: 8px;
    }

    .remarkable input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .dropdowns {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .dropdown-group {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 6px;
      min-width: 0;
      flex: 1;
      background: var(--bg-elevated);
    }
    .dropdown-group.wide {
      flex: 3;
    }
    .dropdown-group.medium {
      flex: 2.5;
    }

    .dropdown-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      margin-bottom: 4px;
      color: var(--text);
    }

    .icon-btn {
      width: 18px;
      height: 18px;
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-muted);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      padding: 0;
    }

    .icon-btn:hover {
      background: var(--border-light);
      color: var(--text);
    }

    .dropdown-group select {
      width: 100%;
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 6px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    .dropdown-group select:focus {
      border-color: var(--border-light);
    }

    .combined-selects {
      display: flex;
      gap: 4px;
    }

    .combined-selects select {
      flex: 1;
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 6px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    .combined-selects select:focus {
      border-color: var(--border-light);
    }

    .image-upload-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .btn-add-images {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-add-images:hover {
      background: var(--green-hover);
    }

    .file-name {
      font-size: 13px;
      color: var(--text-muted);
    }

    .file-limit {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .thumbnails {
      display: grid;
      grid-template-columns: repeat(auto-fill, 100px);
      gap: 12px;
    }

    .thumbnail {
      width: 100px;
      height: 100px;
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumbnail-placeholder {
      color: var(--text-muted);
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .editor-body {
        flex-direction: column;
      }
      .topics-nav {
        width: 100%;
        max-height: 160px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="editor">
      <div class="editor-header">For 10 Jul 2026</div>
      <div class="editor-body">
        <div class="topics-col">
          <div class="topics-header">Topics</div>
          <div class="topics-nav" id="topicsNav"></div>
        </div>
        <div class="editor-col">
          <div class="editor-col-header">
            <span>Editor</span>
            <div style="display:flex;gap:8px;">
              <button class="assessment-badge" onclick="window.open('../assessment/assessment_editor.html', '_blank')">
                <span class="dot"></span> Assessment
              </button>
              <button class="vpe-badge" onclick="window.open('../exam-forms/exam_forms_editor.html', '_blank')">
                <span class="dot"></span> Vital & PE
              </button>
              <button class="tx-badge" onclick="window.open('../assessment/assessment_editor.html', '_blank')">
                <span class="dot"></span> Tx
              </button>
              <button class="rx-badge" onclick="window.open('../assessment/assessment_editor.html', '_blank')">
                <span class="dot"></span> Rx
              </button>
            </div>
          </div>
          <div class="topics-content" id="topicsContent"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const topics = [
      'History Taking',
      'HIstory Medication and Food',
      'Note',
      'Appearance',
      'Hydration',
      'Abdomen',
      'Heart (Cardiology)',
      'Thorax',
      'Eye (Ophthalmology)',
      'Ear',
      'Nose',
      'Oral/Dental',
      'Musculoskeletal',
      'Neurological',
      'Dermatological',
      'Gynecological',
      'Urological',
      'Oncological',
      'Lymph nodes',
      'Add Images',
      'Assessment',
      'Tx',
      'Rx'
    ];

    const topicsNav = document.getElementById('topicsNav');
    const topicsContent = document.getElementById('topicsContent');

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    function createDropdown(label, placeholder, options, size) {
      var opts = '';
      if (options && options.length) {
        opts = options.map(function(o) {
          return '<option value="' + o.value + '">' + o.text + '</option>';
        }).join('');
      } else {
        opts = '<option value="1">Option 1</option><option value="2">Option 2</option><option value="3">Option 3</option>';
      }
      var sizeClass = size ? ' ' + size : '';
      return `
        <div class="dropdown-group${sizeClass}">
          <div class="dropdown-header">
            <span>${label}</span>
            <button type="button" class="icon-btn" title="Add">+</button>
          </div>
          <select>
            ${placeholder ? '<option value="" disabled selected>' + placeholder + '</option>' : ''}
            ${opts}
          </select>
        </div>
      `;
    }

    function createCombinedDropdown(label, orderOpts, formOpts, size) {
      var orderOptsHtml = orderOpts.map(function(o) {
        return '<option value="' + o.value + '">' + o.text + '</option>';
      }).join('');
      var formOptsHtml = formOpts.map(function(o) {
        return '<option value="' + o.value + '">' + o.text + '</option>';
      }).join('');
      var sizeClass = size ? ' ' + size : '';
      return `
        <div class="dropdown-group${sizeClass}">
          <div class="dropdown-header">
            <span>${label}</span>
            <button type="button" class="icon-btn" title="Add">+</button>
          </div>
          <div class="combined-selects">
            <select>${orderOptsHtml}</select>
            <select>${formOptsHtml}</select>
          </div>
        </div>
      `;
    }

    function createImageSection(index) {
      return `
        <div class="topic-section" id="topic-${index}">
          <div class="topic-title">${index}. ${topics[index - 1]}</div>
          <div class="image-upload-row">
            <label for="add-images" class="btn-add-images">Add images</label>
            <input type="file" id="add-images" accept="image/*" multiple hidden>
            <span class="file-name" id="file-name">No file selected</span>
          </div>
          <div class="file-limit">New images limit: 5, 10 MB</div>
          <div class="thumbnails">
            <div class="thumbnail"><img src="../../resource/img/image_avatar_poodle_square2.jpg" alt="Thumbnail 1"></div>
            <div class="thumbnail"><img src="../../resource/img/image_avatar_poodle.jpg" alt="Thumbnail 2"></div>
            <div class="thumbnail"><img src="../../resource/img/image_avatar_poodle.webp" alt="Thumbnail 3"></div>
            <div class="thumbnail"><img src="../../resource/img/image_avatar_poodle_square2.jpg" alt="Thumbnail 4"></div>
            <div class="thumbnail"><img src="../../resource/img/image_avatar_poodle.jpg" alt="Thumbnail 5"></div>
          </div>
        </div>
      `;
    }

    function createAssessmentSection(index) {
      return `
        <div class="topic-section" id="topic-${index}">
          <div class="topic-title">${topics[index - 1]}</div>
          <div class="topic-assessment-block">
<div class="asm-title">--- Assessment Summary ---</div>
<span class="asm-label">:</span> สัตว์มีอาการอาเจียน ซึม ท้องเสีย 2 วัน ตรวจพบ dehydration ปานกลาง ปวดท้อง cranial abdomen ผล Vcheck cPL > 900 ng/ml ยืนยันการวินิจฉัย Pancreatitis เป็นสาเหตุหลัก พร้อม DDx ได้แก่ Acute Gastroenteritis และ Foreign Body Ingestion แนะนำให้น้ำเกลือแร่ ยาต้านอาเจียน งดอาหาร รอผล CBC/Chem และ ultrasound เพื่อประเมินความรุนแรงเพิ่มเติม

<div class="asm-title">--- Selected Problems/Diagnosis (2 selected) ---</div>
1. Acute Gastroenteritis     → Problem    | Clinical Sign    | Active
2. Dehydration (moderate)    → Disorder   | Clinical Sign    | Resolved

<div class="asm-title">--- Detail Panel (Acute Gastroenteritis — บันทึกแล้ว 09/07/26 08:15) ---</div>
<span class="asm-label">Problem Type:</span>             Clinical Sign
<span class="asm-label">Prognosis:</span>                   ตอบสนองการรักษาดี (Good)
<span class="asm-label">Status:</span>                         กำลังรักษา (Active)
<span class="asm-label">Severity:</span>                      ปานกลาง (Moderate)
<span class="asm-label">Expected Duration:</span>     3-5 วัน
<span class="asm-label">Confidence:</span>                มีหลักฐานสนับสนุนชัดเจน (High)
<span class="asm-label">Confirmatory Findings:</span>
<div class="asm-detail">- ประวัติอาเจียนและท้องเสียเฉียบพลัน 2 วัน, physical exam พบ increased bowel sounds, ไม่มี palpable mass หรือ foreign body</div>
<span class="asm-label">Clinical Reasoning:</span>
<div class="asm-detail">- สัตว์มีประวัติอาเจียนและท้องเสียเฉียบพลัน 2 วัน ตรวจพบ dehydration ปานกลาง ไม่มีปวดท้องเรื้อรังหรือ palpable mass สอดคล้องกับ acute gastroenteritis จาก dietary indiscretion หรือ infection แยกจาก pancreatitis ซึ่งมี cPL สูงและปวดท้อง cranial abdomen ชัดเจน</div>
<span class="asm-label">Problem Note:</span>
<div class="asm-detail">- ให้ supportive treatment ด้วย IV fluid, antiemetic, probiotic, งดอาหาร 12-24 ชม. แล้วค่อยๆ กลับมาให้อาหารง่ายย่อย, ติดตามอาการทุก 24 ชม.</div>
<span class="asm-label">Relation Diagnosis:</span>
<div class="asm-detail">- อยู่ในแผนพัฒนาระยะท้าย (disabled)</div>

<div class="asm-title">--- Detail Panel (Dehydration (moderate) — บันทึกแล้ว 09/07/26 08:15) ---</div>
<span class="asm-label">Problem Type:</span>             Clinical Sign
<span class="asm-label">Prognosis:</span>                   -
<span class="asm-label">Status:</span>                         กำลังรักษา (Active)
<span class="asm-label">Severity:</span>                      -
<span class="asm-label">Expected Duration:</span>     -
<span class="asm-label">Confidence:</span>                -
<span class="asm-label">Confirmatory Findings:</span>
<div class="asm-detail">-</div>
<span class="asm-label">Clinical Reasoning:</span>
<div class="asm-detail">-</div>
<span class="asm-label">Problem Note:</span>
<div class="asm-detail">-</div>
<span class="asm-label">Relation Diagnosis:</span>
<div class="asm-detail">- อยู่ในแผนพัฒนาระยะท้าย (disabled)</div>
          </div>
        </div>
      `;
    }

    function createTxSection(index) {
      var txSel = [
        { name: "Prednisolone acetate injection (25 mg/ml) (Predni-Ject)", tag: "ยาฉีด (Injection)", route: "ฉีดเข้าใต้ผิวหนัง (SC)", amt: "0.4", unit: "ซีซี (CC)", freq: "วันละ 1 ครั้ง (SID)", note: "- เขย่าขวดก่อนฉีด เก็บในตู้เย็น 2-8°C ห้ามแช่แข็ง\n- ฉีดเข้าใต้ผิวหนังบริเวณสะบัก คลึงเบา ๆ หลังฉีด\n- ห้ามหยุดยาเอง ให้ค่อย ๆ ลดขนาดยา (tapering) ตามที่สัตวแพทย์สั่ง\n- สังเกตอาการกินน้ำ/ปัสสาวะมากผิดปกติ หากพบแจ้งสัตวแพทย์", time: '09/07/26 08:15' },
        { name: "0.9% Sodium Chloride (NSS) 500 ml", tag: "สารน้ำ / IV Fluid", route: "ฉีดเข้าหลอดเลือดดำแบบหยด (IV drip)", amt: "350", unit: "มิลลิลิตร (ml)", freq: "60 ml/hr (minidrip)", note: "- ให้ NSS จากขวด 500 ml เฉพาะปริมาณ 350 ml (ไม่ต้องให้หมดขวด) IV drip อัตรา 60 ml/hr\n- ใช้ชุดให้สารน้ำ minidrip (60 drops/ml) → ปรับหยด = 60 หยด/นาที (≈ 1 หยด/วินาที)\n- เฝ้าระวังอาการบวมน้ำ หายใจเร็ว/ลำบาก หรือบวมบริเวณที่แทงเข็ม\n- ตรวจตำแหน่งเข็มและปริมาณคงเหลือทุก 1 ชั่วโมง บันทึกลงใบ monitor\n- ระบุวันที่/เวลาเริ่มให้ และผู้ให้บนฉลากขวดทุกครั้ง", time: '09/07/26 08:20' },
        { name: "Enrofloxacin injection (25 mg/ml) (Baytril)", tag: "ยาฉีด (Injection)", route: "ฉีดเข้าใต้ผิวหนัง (SC)", amt: "0.5", unit: "ซีซี (CC)", freq: "วันละ 1 ครั้ง (SID)", note: "- ฉีดเข้าใต้ผิวหนัง อาจระคายเคืองเฉพาะที่ ให้คลึงเบา ๆ หลังฉีด\n- ห้ามใช้ในสัตว์อายุน้อยที่กำลังเจริญเติบโต (ผลต่อกระดูกอ่อน)\n- ให้ครบ course ตามที่สัตวแพทย์สั่ง ห้ามหยุดยาเอง\n- เก็บพ้นแสง อุณหภูมิห้อง", time: '09/07/26 08:25' }
      ];

          '<div class="asm-row"><span class="asm-label">Category:</span><span class="asm-val">' + s.tag + '</span></div>' +
          '<div class="asm-row"><span class="asm-label">Route:</span><span class="asm-val">' + (s.route || '—') + '</span></div>' +
          '<div class="asm-row"><span class="asm-label">Dose:</span><span class="asm-val">' + doseStr(s) + '</span></div>' +
          '<div class="asm-row"><span class="asm-label">Frequency/Rate:</span><span class="asm-val">' + (s.freq || '—') + '</span></div>' +
          '<div class="asm-row"><span class="asm-label">Note:</span></div>' +
          noteLines;
      }).join('\n');

      return `
        <div class="topic-section" id="topic-${index}">
          <div class="topic-title">${topics[index - 1]}</div>
          <div class="topic-assessment-block">
<div class="asm-title">--- Tx Summary ---</div>
<span class="asm-label">:</span> ${txNote}

<div class="asm-title">--- Selected Items (${txSel.length} บันทึกแล้ว) ---</div>
${selLines}

${detailPanels}
          </div>
        </div>
      `;
    }

    function createRxSection(index) {
      var rxSel = [
        { name: "Prednisolone acetate injection (25 mg/ml) (Predni-Ject)", tag: "ยาฉีด (Injection)", route: "ฉีดเข้าใต้ผิวหนัง (SC)", amt: "0.4", unit: "ซีซี (CC)", freq: "วันละ 1 ครั้ง (SID)", note: "- เขย่าขวดก่อนฉีด เก็บในตู้เย็น 2-8°C ห้ามแช่แข็ง\n- ฉีดเข้าใต้ผิวหนังบริเวณสะบัก คลึงเบา ๆ หลังฉีด\n- ห้ามหยุดยาเอง ให้ค่อย ๆ ลดขนาดยา (tapering) ตามที่สัตวแพทย์สั่ง\n- สังเกตอาการกินน้ำ/ปัสสาวะมากผิดปกติ หากพบแจ้งสัตวแพทย์", time: '09/07/26 08:15' },
        { name: "0.9% Sodium Chloride (NSS) 500 ml", tag: "สารน้ำ / IV Fluid", route: "ฉีดเข้าหลอดเลือดดำแบบหยด (IV drip)", amt: "350", unit: "มิลลิลิตร (ml)", freq: "60 ml/hr (minidrip)", note: "- ให้ NSS จากขวด 500 ml เฉพาะปริมาณ 350 ml (ไม่ต้องให้หมดขวด) IV drip อัตรา 60 ml/hr\n- ใช้ชุดให้สารน้ำ minidrip (60 drops/ml) → ปรับหยด = 60 หยด/นาที (≈ 1 หยด/วินาที)\n- เฝ้าระวังอาการบวมน้ำ หายใจเร็ว/ลำบาก หรือบวมบริเวณที่แทงเข็ม\n- ตรวจตำแหน่งเข็มและปริมาณคงเหลือทุก 1 ชั่วโมง บันทึกลงใบ monitor\n- ระบุวันที่/เวลาเริ่มให้ และผู้ให้บนฉลากขวดทุกครั้ง", time: '09/07/26 08:20' },
        { name: "Enrofloxacin injection (25 mg/ml) (Baytril)", tag: "ยาฉีด (Injection)", route: "ฉีดเข้าใต้ผิวหนัง (SC)", amt: "0.5", unit: "ซีซี (CC)", freq: "วันละ 1 ครั้ง (SID)", note: "- ฉีดเข้าใต้ผิวหนัง อาจระคายเคืองเฉพาะที่ ให้คลึงเบา ๆ หลังฉีด\n- ห้ามใช้ในสัตว์อายุน้อยที่กำลังเจริญเติบโต (ผลต่อกระดูกอ่อน)\n- ให้ครบ course ตามที่สัตวแพทย์สั่ง ห้ามหยุดยาเอง\n- เก็บพ้นแสง อุณหภูมิห้อง", time: '09/07/26 08:25' }
      ];
      var rxNote = 'สัตว์เลี้ยงเคยให้ยามาแล้ว ให้เปลี่ยนขาในการให้ยา ไม่ซ้ำกับคราวที่แล้ว และโกนขนบริเวณที่ฉีดยาด้วย';

      function rxRouteEng(it) {
        if (!it.route) return '—';
        var m = it.route.match(/\(([^)]+)\)/);
        return m ? m[1] : it.route;
      }
      function rxUnitEng(it) {
        if (!it.unit) return '—';
        var mu = it.unit.match(/\(([^)]+)\)/);
        return mu ? mu[1] : it.unit;
      }
      function rxDoseStr(it) {
        return it.amt ? it.amt + ' ' + rxUnitEng(it) : '—';
      }

      var rxSelLines = rxSel.map(function(s, i) {
        return (i + 1) + '. ' + s.name + '    → ' + s.tag + '    | ' + rxRouteEng(s) + '    | ' + rxDoseStr(s);
      }).join('\n');

      var rxDetailPanels = rxSel.map(function(s) {
        var noteLines = s.note.split('\n').map(function(l) { return '<div class="asm-detail">' + l + '</div>'; }).join('');
        return '<div class="asm-title">--- Detail Panel (' + s.name + ' — บันทึกแล้ว ' + s.time + ') ---</div>' +
          '<div class="asm-row"><span class="asm-label">Category:</span><span class="asm-val">' + s.tag + '</span></div>' +
          '<div class="asm-row"><span class="asm-label">Route:</span><span class="asm-val">' + (s.route || '—') + '</span></div>' +
          '<div class="asm-row"><span class="asm-label">Dose:</span><span class="asm-val">' + rxDoseStr(s) + '</span></div>' +
          '<div class="asm-row"><span class="asm-label">Frequency/Rate:</span><span class="asm-val">' + (s.freq || '—') + '</span></div>' +
          '<div class="asm-row"><span class="asm-label">Note:</span></div>' +
          noteLines;
      }).join('\n');

      return `
        <div class="topic-section" id="topic-${index}">
          <div class="topic-title">${topics[index - 1]}</div>
          <div class="topic-assessment-block">
<div class="asm-title">--- Rx Summary ---</div>
<span class="asm-label">:</span> ${rxNote}

<div class="asm-title">--- Selected Items (${rxSel.length} บันทึกแล้ว) ---</div>
${rxSelLines}

${rxDetailPanels}
          </div>
        </div>
      `;
    }

    function createTopicSection(index) {
      if (index === 20) {
        return createImageSection(index);
      }
      if (index === 21) {
        return createAssessmentSection(index);
      }
      if (index === 22) {
        return createTxSection(index);
      }
      if (index === 23) {
        return createRxSection(index);
      }
      return `
        <div class="topic-section" id="topic-${index}">
          <div class="topic-title">${index}. ${topics[index - 1]}</div>
          <textarea class="topic-textarea" placeholder="Enter ${topics[index - 1]} details..." oninput="autoResize(this)"></textarea>
          <div class="extras-row">
            <label class="remarkable">
              <input type="checkbox">
              <span>Remarkable</span>
            </label>
            <div class="dropdowns">
              ${createDropdown('My exam template', 'Select Template', null, 'wide')}
              ${createDropdown('Guideline', 'Select Guideline', null, 'wide')}
              ${createCombinedDropdown('Order', [
                { value: 'Tx', text: 'Tx' },
                { value: 'Rx', text: 'Rx' },
                { value: 'LAB', text: 'LAB' },
                { value: 'PATH', text: 'PATH' },
                { value: 'all', text: 'all' }
              ], [
                { value: '1', text: 'แบบที่ 1' },
                { value: '2', text: 'แบบที่ 2' },
                { value: '3', text: 'แบบที่ 3' }
              ], 'medium')}
            </div>
          </div>
        </div>
      `;
    }

    topics.forEach((topic, i) => {
      const index = i + 1;
      const item = document.createElement('div');
      item.className = 'topic-item';
      if (index === 21 || index === 22 || index === 23) {
        item.textContent = topic;
      } else {
        item.textContent = `${index}. ${topic}`;
      }
      item.dataset.target = `topic-${index}`;
      item.addEventListener('click', () => {
        const target = document.getElementById(item.dataset.target);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
      topicsNav.appendChild(item);
      if (index === 20) {
        const hr = document.createElement('hr');
        hr.className = 'topics-nav-divider';
        topicsNav.appendChild(hr);
      }
    });

    topics.forEach((_, i) => {
      topicsContent.insertAdjacentHTML('beforeend', createTopicSection(i + 1));
    });

    topicsContent.querySelectorAll('.topic-textarea').forEach(autoResize);

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            document.querySelectorAll('.topic-item').forEach((item) => {
              item.classList.toggle('active', item.dataset.target === id);
            });
          }
        });
      },
      { root: topicsContent, threshold: 0.5 }
    );

    document.querySelectorAll('.topic-section').forEach((section) => observer.observe(section));

    document.getElementById('add-images')?.addEventListener('change', (e) => {
      const files = e.target.files;
      const label = document.getElementById('file-name');
      if (files && files.length > 0) {
        const names = Array.from(files).map(f => f.name).join(', ');
        label.textContent = names.length > 40 ? names.slice(0, 40) + '...' : names;
      } else {
        label.textContent = 'No file selected';
      }
    });
  </script>
</body>
