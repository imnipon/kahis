<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAHIS - Subjective Editor</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-elevated: #ffffff;
      --bg-card: #e1e8f0;
      --bg-card-hover: #d9e3ef;
      --border: #d9d9d9;
      --border-light: #eaeef3;
      --text: #3d4e60;
      --text-muted: #5c6d7d;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --text-blue: #2563eb;
      --green: #10b981;
      --green-hover: #1ab784;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-y: auto;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
      height: auto;
    }

    .editor {
      width: 100%;
      max-width: 1200px;
      height: auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .editor-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elevated);
      font-weight: 600;
      font-size: 14px;
      color: var(--text-blue);
      flex-shrink: 0;
    }

    .editor-body {
      display: flex;
      align-items: stretch;
    }

    .topics-col {
      width: 260px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
    }

    .topics-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }

    .topics-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .topic-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 4px;
      transition: background 0.15s, color 0.15s;
      border: 1px solid transparent;
    }

    .topic-item:hover {
      background: var(--bg-card-hover);
      color: var(--text);
    }

    .topic-item.active {
      background: var(--bg-elevated);
      color: var(--text);
      border-color: var(--accent);
    }

    .editor-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-elevated);
    }

    .editor-col-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }

    .topics-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }

    .topic-section {
      padding-bottom: 32px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      scroll-margin-top: 80px;
    }

    .topic-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 60vh;
    }

    .topic-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    .topic-textarea {
      width: 100%;
      min-height: 80px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      overflow: hidden;
      outline: none;
    }

    .topic-textarea:focus {
      border-color: var(--border-light);
    }

    .topic-textarea::placeholder {
      color: var(--text-muted);
    }

    .extras-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-top: 16px;
    }

    .remarkable {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      margin-top: 8px;
    }

    .remarkable input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .dropdowns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .dropdown-group {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      min-width: 220px;
      background: var(--bg-elevated);
    }

    .dropdown-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .icon-btn {
      width: 22px;
      height: 22px;
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-muted);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
    }

    .icon-btn:hover {
      background: var(--border-light);
      color: var(--text);
    }

    .dropdown-group select {
      width: 100%;
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .dropdown-group select:focus {
      border-color: var(--border-light);
    }

    .image-upload-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .btn-add-images {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-add-images:hover {
      background: var(--green-hover);
    }

    .file-name {
      font-size: 13px;
      color: var(--text-muted);
    }

    .file-limit {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .thumbnails {
      display: grid;
      grid-template-columns: repeat(auto-fill, 100px);
      gap: 12px;
    }

    .thumbnail {
      width: 100px;
      height: 100px;
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumbnail-placeholder {
      color: var(--text-muted);
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .editor-body {
        flex-direction: column;
      }
      .topics-nav {
        width: 100%;
        max-height: 160px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="editor">
      <div class="editor-header">For 10 Jul 2026</div>
      <div class="editor-body">
        <div class="topics-col">
          <div class="topics-header">Topics</div>
          <div class="topics-nav" id="topicsNav"></div>
        </div>
        <div class="editor-col">
          <div class="editor-col-header">Editor</div>
          <div class="topics-content" id="topicsContent"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const topics = [
      'History Taking',
      'HIstory Medication and Food',
      'Note',
      'Appearance',
      'Hydration',
      'Abdomen',
      'Heart (Cardiology)',
      'Thorax',
      'Eye (Ophthalmology)',
      'Ear',
      'Nose',
      'Oral/Dental',
      'Musculoskeletal',
      'Neurological',
      'Dermatological',
      'Gynecological',
      'Urological',
      'Oncological',
      'Lymph nodes',
      'Add Images'
    ];

    const topicsNav = document.getElementById('topicsNav');
    const topicsContent = document.getElementById('topicsContent');

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    function createDropdown(label, placeholder) {
      return `
        <div class="dropdown-group">
          <div class="dropdown-header">
            <span>${label}</span>
            <button type="button" class="icon-btn" title="Add">+</button>
          </div>
          <select>
            <option value="" disabled selected>${placeholder}</option>
            <option value="1">Option 1</option>
            <option value="2">Option 2</option>
            <option value="3">Option 3</option>
          </select>
        </div>
      `;
    }

    function createImageSection(index) {
      return `
        <div class="topic-section" id="topic-${index}">
          <div class="topic-title">${index}. ${topics[index - 1]}</div>
          <div class="image-upload-row">
            <label for="add-images" class="btn-add-images">Add images</label>
            <input type="file" id="add-images" accept="image/*" multiple hidden>
            <span class="file-name" id="file-name">No file selected</span>
          </div>
          <div class="file-limit">New images limit: 5, 10 MB</div>
          <div class="thumbnails">
            <div class="thumbnail"><img src="../../resource/image_avatar_poodle_square2.jpg" alt="Thumbnail 1"></div>
            <div class="thumbnail"><img src="../../resource/image_avatar_poodle.jpg" alt="Thumbnail 2"></div>
            <div class="thumbnail"><img src="../../resource/image_avatar_poodle.webp" alt="Thumbnail 3"></div>
            <div class="thumbnail"><img src="../../resource/image_avatar_poodle_square2.jpg" alt="Thumbnail 4"></div>
            <div class="thumbnail"><img src="../../resource/image_avatar_poodle.jpg" alt="Thumbnail 5"></div>
          </div>
        </div>
      `;
    }

    function createTopicSection(index) {
      if (index === 20) {
        return createImageSection(index);
      }
      return `
        <div class="topic-section" id="topic-${index}">
          <div class="topic-title">${index}. ${topics[index - 1]}</div>
          <textarea class="topic-textarea" placeholder="Enter ${topics[index - 1]} details..." oninput="autoResize(this)"></textarea>
          <div class="extras-row">
            <label class="remarkable">
              <input type="checkbox">
              <span>Remarkable</span>
            </label>
            <div class="dropdowns">
              ${createDropdown('My exam template', 'Select Template')}
              ${createDropdown('Guideline', 'Select Guideline')}
            </div>
          </div>
        </div>
      `;
    }

    topics.forEach((topic, i) => {
      const index = i + 1;
      const item = document.createElement('div');
      item.className = 'topic-item';
      item.textContent = `${index}. ${topic}`;
      item.dataset.target = `topic-${index}`;
      item.addEventListener('click', () => {
        const target = document.getElementById(item.dataset.target);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
      topicsNav.appendChild(item);
    });

    topics.forEach((_, i) => {
      topicsContent.insertAdjacentHTML('beforeend', createTopicSection(i + 1));
    });

    topicsContent.querySelectorAll('.topic-textarea').forEach(autoResize);

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            document.querySelectorAll('.topic-item').forEach((item) => {
              item.classList.toggle('active', item.dataset.target === id);
            });
          }
        });
      },
      { root: topicsContent, threshold: 0.5 }
    );

    document.querySelectorAll('.topic-section').forEach((section) => observer.observe(section));

    document.getElementById('add-images')?.addEventListener('change', (e) => {
      const files = e.target.files;
      const label = document.getElementById('file-name');
      if (files && files.length > 0) {
        const names = Array.from(files).map(f => f.name).join(', ');
        label.textContent = names.length > 40 ? names.slice(0, 40) + '...' : names;
      } else {
        label.textContent = 'No file selected';
      }
    });
  </script>
</body>
</html>
