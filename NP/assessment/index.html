<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessment</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #141414;
      --border: #222222;
      --text: #e5e5e5;
      --text-muted: #888888;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 26px;
    }

    p {
      margin: 0 0 24px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    a {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-weight: 600;
      transition: background 0.15s;
    }

    a:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Assessment</h1>
    <p>This is the assessment sub-page opened from the landing page.</p>
    <a href="../../index.html">Back to landing page</a>
  </div>
</body>
</html>
